name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |-
            set -euo pipefail

            APP_DIR=/opt/apps/kids-chinese-storybook
            REPO=https://github.com/ericmr1981/kids-chinese-storybook-staging.git
            REPO_PROXY=https://ghproxy.com/${REPO}

            if ! command -v git >/dev/null 2>&1; then
              apt-get update -y && apt-get install -y git
            fi
            if ! command -v curl >/dev/null 2>&1; then
              apt-get update -y && apt-get install -y curl
            fi

            if ! command -v node >/dev/null 2>&1; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi

            corepack enable || true
            corepack prepare pnpm@latest --activate || true

            mkdir -p "$APP_DIR"

            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch --all --prune
              git reset --hard origin/main
            else
              rm -rf "$APP_DIR"/*
              cd "$APP_DIR"
              if ! git clone "$REPO" .; then
                git clone "$REPO_PROXY" .
              fi
              git checkout main
            fi

            pnpm config set registry https://registry.npmmirror.com
            npm config set registry https://registry.npmmirror.com || true

            # 后端构建
            cd "$APP_DIR/backend"
            if [ -d "$APP_DIR/backend" ]; then
              pnpm install
              pnpm build
            fi

            # 前端构建
            cd "$APP_DIR"
            pnpm install --frozen-lockfile
            pnpm build

            # 确保 keys.enc 文件存在
            touch "$APP_DIR/keys.enc"
            chmod 600 "$APP_DIR/keys.enc"

            # 前端 systemd 服务
            cat > /etc/systemd/system/kids-storybook-frontend.service << 'EOF'
            [Unit]
            Description=Kids Chinese Storybook Frontend
            After=network.target
            [Service]
            Type=simple
            WorkingDirectory=/opt/apps/kids-chinese-storybook
            ExecStart=/usr/bin/env pnpm preview
            Restart=always
            RestartSec=2
            [Install]
            WantedBy=multi-user.target
            EOF

            # 后端 systemd 服务
            cat > /etc/systemd/system/kids-storybook-backend.service << 'EOF'
            [Unit]
            Description=Kids Chinese Storybook Backend
            After=network.target
            [Service]
            Type=simple
            WorkingDirectory=/opt/apps/kids-chinese-storybook/backend
            ExecStart=/usr/bin/env node dist/index.js
            Restart=always
            RestartSec=2
            Environment=NODE_ENV=production
            EnvironmentFile=/etc/kids-storybook/backend.env
            [Install]
            WantedBy=multi-user.target
            EOF

            systemctl daemon-reload
            systemctl enable --now kids-storybook-frontend.service
            systemctl enable --now kids-storybook-backend.service
            systemctl restart kids-storybook-frontend.service
            systemctl restart kids-storybook-backend.service

            echo "Deployed. Frontend: 0.0.0.0:8083, Backend: 0.0.0.0:3000"