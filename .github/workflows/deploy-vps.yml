name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write SSH key (raw or base64)
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p .github
          python3 - <<'PY'
          import os, base64
          raw = os.environ.get('VPS_SSH_KEY','')
          raw = raw.strip()
          # Remove accidental label lines
          raw_lines = [ln for ln in raw.replace('','').split('
') if ln.strip() and not ln.strip().startswith(('Name:', 'Value:'))]
          raw2 = '
'.join(raw_lines).strip()

          def normalize(k: str) -> str:
              k = k.replace('','')
              k = '
'.join([ln.lstrip() for ln in k.split('
')]).strip() + '
'
              return k

          key = normalize(raw2)
          if ('BEGIN' not in key) or ('PRIVATE KEY' not in key):
              # Might be base64-encoded
              try:
                  decoded = base64.b64decode(raw2).decode('utf-8', 'ignore')
                  decoded = normalize(decoded)
                  if ('BEGIN' in decoded) and ('PRIVATE KEY' in decoded):
                      key = decoded
                  else:
                      raise SystemExit('VPS_SSH_KEY is neither a raw private key nor base64(private_key). Please paste the full key including BEGIN/END lines, or store base64 of the key.')
              except Exception as e:
                  raise SystemExit('VPS_SSH_KEY is neither a raw private key nor base64(private_key). Please paste the full key including BEGIN/END lines, or store base64 of the key.')

          open('.github/.deploy_key','w',encoding='utf-8').write(key)
          PY
          chmod 600 .github/.deploy_key

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key_path: .github/.deploy_key
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail

            APP_DIR=/opt/apps/kids-chinese-storybook
            REPO=https://github.com/ericmr1981/kids-chinese-storybook-staging.git
            REPO_PROXY=https://ghproxy.com/${REPO}

            if ! command -v git >/dev/null 2>&1; then
              apt-get update -y && apt-get install -y git
            fi
            if ! command -v curl >/dev/null 2>&1; then
              apt-get update -y && apt-get install -y curl
            fi

            if ! command -v node >/dev/null 2>&1; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi
            corepack enable || true
            corepack prepare pnpm@latest --activate || true

            mkdir -p "$APP_DIR"

            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch --all --prune
              git reset --hard origin/main
            else
              rm -rf "$APP_DIR"/*
              cd "$APP_DIR"
              if ! git clone "$REPO" .; then
                git clone "$REPO_PROXY" .
              fi
              git checkout main
            fi

            pnpm config set registry https://registry.npmmirror.com
            npm config set registry https://registry.npmmirror.com || true

            pnpm install --frozen-lockfile
            pnpm build

            cat >/etc/systemd/system/kids-chinese-storybook.service <<'UNIT'
            [Unit]
            Description=Kids Chinese Storybook (Vite preview)
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=/opt/apps/kids-chinese-storybook
            ExecStart=/usr/bin/env pnpm preview
            Restart=always
            RestartSec=2
            Environment=NODE_ENV=production

            [Install]
            WantedBy=multi-user.target
            UNIT

            systemctl daemon-reload
            systemctl enable --now kids-chinese-storybook.service
            systemctl restart kids-chinese-storybook.service

            echo "Deployed. Listening on 0.0.0.0:8083"
