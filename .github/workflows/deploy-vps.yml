name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write SSH key (sanitized)
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p .github
          python3 - <<'PY'
          import os
          key = os.environ.get('VPS_SSH_KEY','')
          # Normalize line endings and strip accidental indentation
          key = key.replace('\r','')
          key = "\n".join([ln.lstrip() for ln in key.split('\n')]).strip() + "\n"
          if 'BEGIN' not in key or 'PRIVATE KEY' not in key:
              raise SystemExit('VPS_SSH_KEY does not look like a private key (missing header)')
          open('.github/.deploy_key','w',encoding='utf-8').write(key)
          PY
          chmod 600 .github/.deploy_key

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key_path: .github/.deploy_key
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -euo pipefail

            APP_DIR=/opt/apps/kids-chinese-storybook
            REPO=https://github.com/ericmr1981/kids-chinese-storybook-staging.git
            REPO_PROXY=https://ghproxy.com/${REPO}

            if ! command -v git >/dev/null 2>&1; then
              apt-get update -y && apt-get install -y git
            fi
            if ! command -v curl >/dev/null 2>&1; then
              apt-get update -y && apt-get install -y curl
            fi

            if ! command -v node >/dev/null 2>&1; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi
            corepack enable || true
            corepack prepare pnpm@latest --activate || true

            mkdir -p "$APP_DIR"

            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch --all --prune
              git reset --hard origin/main
            else
              rm -rf "$APP_DIR"/*
              cd "$APP_DIR"
              if ! git clone "$REPO" .; then
                git clone "$REPO_PROXY" .
              fi
              git checkout main
            fi

            pnpm config set registry https://registry.npmmirror.com
            npm config set registry https://registry.npmmirror.com || true

            pnpm install --frozen-lockfile
            pnpm build

            cat >/etc/systemd/system/kids-chinese-storybook.service <<'UNIT'
            [Unit]
            Description=Kids Chinese Storybook (Vite preview)
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=/opt/apps/kids-chinese-storybook
            ExecStart=/usr/bin/env pnpm preview
            Restart=always
            RestartSec=2
            Environment=NODE_ENV=production

            [Install]
            WantedBy=multi-user.target
            UNIT

            systemctl daemon-reload
            systemctl enable --now kids-chinese-storybook.service
            systemctl restart kids-chinese-storybook.service

            echo "Deployed. Listening on 0.0.0.0:8083"
